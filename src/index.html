<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <header>
      <form action="">
        <label for="search-bar" class="visually-hidden">Search</label>
        <input type="search" name="q" id="search-bar" placeholder="Search..." />
        <button type="submit">Submit</button>
      </form>

      <label class="toggle">
        <input type="checkbox" id="unit-toggle" checked />
        <span>°F</span>
      </label>
    </header>
    <div id="error-message" class="error" hidden></div>
    <div class="content">
      <section class="current-conditions"></section>
      <section class="alerts"></section>
      <section class="week-forecast"></section>
    </div>
  </body>
</html>
